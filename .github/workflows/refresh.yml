name: Refresh Terraform Registry data

on:
  workflow_dispatch:
    inputs:
      note:
        description: "Optional note for this run"
        default: ""
        required: false
  schedule:
    # Daily at 05:01 UTC (10:31 IST)
    - cron: '1 5 * * *'

# Prevent overlapping runs — cancel in-progress if a new one starts
concurrency:
  group: refresh-data
  cancel-in-progress: false   # let daily runs complete; don't cancel mid-write

permissions:
  contents: write

jobs:
  fetch-and-build:
    name: Fetch providers & compute metrics
    runs-on: ubuntu-latest
    timeout-minutes: 20         # guard against hung network calls

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'          # caches ~/.npm even with zero dependencies

      - name: Fetch providers and build metrics
        env:
          TZ: Asia/Kolkata
        run: |
          echo "" > data/.nojekyll
          node scripts/fetch.js

      - name: Commit updated data files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "uibm"
          git config user.email "uibm@users.noreply.github.com"
          git remote set-url origin \
            https://uibm:${GH_TOKEN}@github.com/${{ github.repository }}.git

          git add data/ data/.nojekyll

          # Only commit when there are actual changes
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit"
            exit 0
          fi

          git commit -m "data: refresh $(date +'%Y-%m-%d %H:%M %Z')${{ github.event.inputs.note != '' && format(' — {0}', github.event.inputs.note) || '' }}"

      - name: Push with retry (network resilience)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Skip push if nothing was committed
          if git diff HEAD~1 --quiet 2>/dev/null; then
            echo "Nothing to push"
            exit 0
          fi

          max_retries=4
          delay=2
          for attempt in $(seq 1 $max_retries); do
            if git push; then
              echo "✓ Push succeeded on attempt $attempt"
              exit 0
            fi
            if [ $attempt -lt $max_retries ]; then
              echo "Push failed — retrying in ${delay}s (attempt $attempt/$max_retries)"
              sleep $delay
              delay=$((delay * 2))
            fi
          done

          echo "✗ Push failed after $max_retries attempts"
          exit 1